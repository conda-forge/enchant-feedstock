schema_version: 1

context:
  version: "2.8.15"

package:
  name: enchant
  version: ${{ version }}

source:
  url: https://github.com/rrthomas/enchant/releases/download/v${{ version }}/enchant-${{ version }}.tar.gz
  sha256: d3fd9e4170bfb5110b0bda577fe764a38fb606b3c25d2f0c3840234521ff1252

build:
  number: 0
  skip: not unix

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - make
    - pkg-config
    - autoconf
    - automake
    - groff
  host:
    - glib
    - hunspell
    - libtool
    - pkg-config
  run:
    - hunspell
  run_exports:
    - ${{ pin_subpackage('enchant', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then: enchant-2 -v

about:
  license: LGPL-2.1-only
  license_file: COPYING.LIB
  summary: enchant spellchecking library
  homepage: https://rrthomas.github.io/enchant/

extra:
  recipe-maintainers:
    - danielnachun
    - asmeurer
    - izahn
