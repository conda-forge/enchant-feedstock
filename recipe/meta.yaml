{% set name = "enchant" %}
{% set version = "2.8.6" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rrthomas/{{ name }}/releases/download/v{{ version }}/enchant-{{ version }}.tar.gz
  sha256: c4cd0889d8aff8248fc3913de5a83907013962f0e1895030a3836468cd40af5b

build:
  number: 0
  skip: true  # [not unix]
  run_exports:
    - {{ pin_subpackage('enchant', max_pin='x.x') }}

requirements:
  build:
    - make
    - pkg-config
    - autoconf
    - automake
    - libtool
    - zlib
    - groff
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - glib
    - hunspell
    - zlib
    - pkg-config
  run:
    - glib
    - hunspell

test:
  commands:
    - enchant-2 -v  # [unix]

about:
  home: https://rrthomas.github.io/enchant/
  license: LGPL-2.1-only
  license_family: LGPL
  license_file: COPYING.LIB
  summary: enchant spellchecking library

extra:
  recipe-maintainers:
    - asmeurer
    - izahn
